version: '3.8'

services:
  # 1. PostgreSQL (Наша база данных, аналог MS SQL / Entity Framework)
  postgres:
    image: postgres:15-alpine
    container_name: reservation_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: reservation_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d reservation_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis (Распределенный кэш и блокировки)
  redis:
    image: redis:7-alpine
    container_name: reservation_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. RabbitMQ (Брокер сообщений для общения сервисов, с UI панелью управления)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: reservation_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: rmq_admin
      RABBITMQ_DEFAULT_PASS: rmq_password
    ports:
      - "5672:5672"   # Порт для подключения сервисов
      - "15672:15672" # Порт для веб-интерфейса управления
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: